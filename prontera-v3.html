<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Prontera HQ — Command Center</title>
<style>
:root{
  --text:#1d1d1f; --muted:#5f6168; --faint:#8a8d94;
  --accent:#0a84ff; --accent-ink:#fff; --indigo:#5e5ce6;
  --ok:#30a46c; --warn:#e08600; --bad:#e5484d; --okdot:#34c759;
  --radius:18px; --gap:16px;
  --glass:rgba(255,255,255,.52); --glass-2:rgba(255,255,255,.66); --glass-3:rgba(255,255,255,.78);
  --hair:rgba(255,255,255,.6); --line:rgba(60,60,67,.14);
  --shadow:0 10px 34px rgba(20,28,46,.12),0 2px 8px rgba(20,28,46,.07);
  --blur:saturate(180%) blur(24px);
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{display:grid;grid-template-columns:248px 1fr;grid-template-rows:100dvh;
  background:
    radial-gradient(42% 40% at 6% 8%,rgba(10,132,255,.16),transparent 72%),
    radial-gradient(40% 38% at 96% 4%,rgba(94,92,230,.15),transparent 72%),
    radial-gradient(46% 42% at 82% 96%,rgba(255,122,182,.13),transparent 72%),
    radial-gradient(44% 40% at 14% 92%,rgba(48,200,180,.13),transparent 72%),
    radial-gradient(38% 36% at 56% 44%,rgba(255,196,120,.10),transparent 72%),
    radial-gradient(50% 50% at 40% 20%,rgba(120,170,255,.10),transparent 75%),
    linear-gradient(160deg,#f4f6fb,#e9ecf5);
  background-attachment:fixed}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--mono)}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.glass{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);box-shadow:var(--shadow)}

/* ── sidebar ── */
.side{background:var(--glass-2);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-right:1px solid var(--hair);display:flex;flex-direction:column;min-height:0}
.brand{display:flex;align-items:center;gap:11px;padding:20px 18px 14px;font-weight:600;font-size:16px;letter-spacing:.2px}
.brand .dot{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#0a84ff,#5e5ce6);display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;box-shadow:0 4px 12px rgba(10,132,255,.4)}
.brand small{display:block;font-weight:400;font-size:11px;color:var(--faint);letter-spacing:.6px}
.nav{display:flex;flex-direction:column;gap:3px;padding:8px 12px;overflow-y:auto;flex:1;min-height:0}
.nav button{display:flex;align-items:center;gap:12px;width:100%;background:none;border:0;color:var(--muted);padding:11px 13px;border-radius:13px;font-size:14.5px;font-weight:500;text-align:left;transition:background .18s,color .18s}
.nav button svg{width:19px;height:19px;flex:0 0 19px}
.nav button:hover{background:rgba(255,255,255,.55);color:var(--text)}
.nav button.on{background:rgba(10,132,255,.14);color:var(--accent)}
.side-foot{padding:13px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--faint)}

/* ── main ── */
.main{overflow-y:auto;min-height:0}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:15px 24px;background:rgba(255,255,255,.5);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-bottom:1px solid var(--hair)}
.topbar h1{margin:0;font-size:19px;font-weight:600;letter-spacing:-.2px}
.topbar .sub{color:var(--muted);font-size:13px}
.topbar .spacer{flex:1}
.tk{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);padding:7px 13px;border-radius:999px;box-shadow:var(--shadow)}
.tk b{color:var(--text);font-weight:600}
.tk .ring{width:9px;height:9px;border-radius:50%;background:var(--okdot)}
.tbtn{display:grid;place-items:center;width:38px;height:38px;border-radius:999px;background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);color:var(--text);box-shadow:var(--shadow);transition:color .15s}
.tbtn:hover{color:var(--accent)}
.tbtn svg{width:18px;height:18px}
.wrap{padding:24px;max-width:1180px}
.hd{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.02em;margin:28px 0 13px}
.hd:first-child{margin-top:6px}

.grid{display:grid;gap:var(--gap)}
.g-kpi{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.g-cards{grid-template-columns:repeat(auto-fill,minmax(256px,1fr))}
.card,.kpi,.ag,.act,.qi,.ws{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);box-shadow:var(--shadow)}
.card{border-radius:var(--radius);padding:18px}
.kpi{border-radius:var(--radius);padding:16px 18px}
.kpi .l{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
.kpi .v{font-size:29px;font-weight:700;margin-top:6px;letter-spacing:-1px}
.kpi .v small{font-size:13px;font-weight:500;color:var(--muted)}
.kpi svg{width:15px;height:15px;color:var(--accent)}

.ag{border-radius:var(--radius);padding:16px}
.ag-top{display:flex;align-items:center;gap:12px}
.ag-av{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-weight:700;font-size:15px;color:#fff;flex:0 0 40px;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.ag-nm{font-weight:600;font-size:14.5px}
.ag-rl{font-size:12.5px;color:var(--muted)}
.ag-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.chip{font-size:11.5px;font-weight:500;padding:3px 10px;border-radius:999px;background:rgba(120,120,128,.12);color:var(--muted);border:1px solid var(--line)}
.chip.live{background:rgba(48,164,108,.16);color:var(--ok);border-color:rgba(48,164,108,.3)}
.chip.mdl{background:rgba(10,132,255,.13);color:var(--accent);border-color:rgba(10,132,255,.26)}
.chip.mono{font-family:var(--mono);font-size:11px}

.tkrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.tkrow:last-child{border-bottom:0}
.tkrow .nm{width:98px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.tkrow .st{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.bar{flex:1;height:8px;background:rgba(120,120,128,.16);border-radius:999px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#0a84ff,#5e5ce6)}
.tkrow .pc{width:74px;text-align:right;font-size:12px;color:var(--muted)}

.row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.row:last-child{border-bottom:0}
.row .lbl{flex:1;min-width:150px;font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:10px}
.ctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
input,select,textarea{background:var(--glass-3);color:var(--text);border:1px solid var(--line);border-radius:11px;padding:9px 11px;font:inherit;font-size:14px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
input[type=time]{padding:8px 10px}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(10,132,255,.2)}
input:disabled{opacity:.4}
.num{width:64px}
.sw{position:relative;width:46px;height:28px;flex:0 0 46px}
.sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
.sw .tr{position:absolute;inset:0;background:rgba(120,120,128,.22);border-radius:999px;transition:.22s}
.sw .tr::after{content:"";position:absolute;left:2px;top:2px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.28);transition:.22s}
.sw input:checked + .tr{background:var(--okdot)}
.sw input:checked + .tr::after{transform:translateX(18px)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--glass-3);color:var(--text);border:1px solid var(--hair);border-radius:12px;padding:9px 15px;font-size:13.5px;font-weight:500;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:transform .12s,background .15s;box-shadow:0 2px 8px rgba(20,28,46,.08)}
.btn:hover{background:#fff}
.btn:active{transform:scale(.97)}
.btn svg{width:15px;height:15px}
.btn.run{background:rgba(10,132,255,.14);border-color:rgba(10,132,255,.32);color:var(--accent)}
.btn.pri{background:var(--accent);color:#fff;border-color:transparent;font-weight:600;box-shadow:0 4px 14px rgba(10,132,255,.36)}
.btn:disabled{opacity:.45;cursor:default}
.muted{color:var(--muted)}.faint{color:var(--faint)}.fs12{font-size:12px}.fs13{font-size:13px}
.sub{font-size:12px;color:var(--faint);font-weight:400}
.empty{color:var(--faint);font-size:13.5px;padding:22px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius);background:rgba(255,255,255,.35)}
.flex{display:flex;align-items:center;gap:10px}.wrapflex{flex-wrap:wrap}

.act{border-radius:14px;padding:13px 15px;margin-bottom:11px;border-left:3px solid var(--accent)}
.act.stale{border-left-color:var(--warn);opacity:.78}
.act .ph{font-size:13px;font-weight:600;color:var(--accent)}
.act .who{font-weight:600;text-transform:capitalize}

.qi{border-radius:14px;padding:13px 15px;margin-bottom:11px}
.qi .t{font-weight:500;margin:5px 0}
.ws{border-radius:14px;padding:14px 16px;margin-bottom:11px}
.verdict{font-size:11.5px;padding:3px 10px;border-radius:999px;font-weight:600}
.v-ok{background:rgba(48,164,108,.16);color:var(--ok)}
.v-fix{background:rgba(229,72,77,.15);color:var(--bad)}
.v-unclear{background:rgba(224,134,0,.16);color:var(--warn)}

.chatwrap{display:flex;flex-direction:column;height:calc(100dvh - 60px)}
.msgs{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:13px}
.msg{max-width:760px;padding:12px 16px;border-radius:20px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;box-shadow:0 2px 10px rgba(20,28,46,.08)}
.msg.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:6px}
.msg.bot{align-self:flex-start;background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);border-bottom-left-radius:6px}
.msg .nm{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.chatbar{display:flex;gap:10px;padding:15px 24px;border-top:1px solid var(--hair);background:rgba(255,255,255,.5);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);align-items:flex-end}
.chatbar select{flex:0 0 auto}.chatbar input{flex:1}

.office{position:relative;height:calc(100dvh - 60px);width:100%}
.office iframe{width:100%;height:100%;border:0;background:#0a0e14;display:block}
.offull{position:absolute;top:12px;right:16px;z-index:5;font-size:12.5px;font-weight:500;color:var(--text);background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);box-shadow:var(--shadow);padding:7px 13px;border-radius:999px}
@media (max-width:860px){ .office{height:calc(100dvh - 122px)} }

.page{display:none}.page.on{display:block}

.mtop{display:none}
@media (max-width:860px){
  body{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  .side{display:none}
  .mtop{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--glass-2);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-bottom:1px solid var(--hair);position:sticky;top:0;z-index:30}
  .mtop .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#0a84ff,#5e5ce6);display:grid;place-items:center;color:#fff;font-weight:700}
  .mtop b{font-size:15px}
  .topbar{padding:13px 16px}.topbar h1{font-size:17px}
  .wrap{padding:16px}
  .mnav{display:flex;position:sticky;bottom:0;z-index:30;background:var(--glass-2);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-top:1px solid var(--hair);padding:6px 6px 8px;gap:2px;overflow-x:auto;scrollbar-width:none}
  .mnav::-webkit-scrollbar{display:none}
  .mnav button{flex:0 0 auto;min-width:64px;background:none;border:0;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 6px;font-size:10px;font-weight:500;border-radius:11px;min-height:50px;white-space:nowrap}
  .mnav button svg{width:22px;height:22px}
  .mnav button.on{color:var(--accent)}
  input,select,textarea{font-size:16px}
  .btn,.btn.run{min-height:44px}
  .row .lbl{min-width:0;flex:1 1 100%}
  .msg{max-width:88%}
}
@media (min-width:861px){ .mnav{display:none} }
@media (prefers-reduced-motion:reduce){ *{transition:none!important} }
:root[data-theme="dark"]{--text:#f2f3f5;--muted:#a4a7b0;--faint:#7e828c;--line:rgba(255,255,255,.12);
  --glass:rgba(28,30,38,.5);--glass-2:rgba(28,30,38,.62);--glass-3:rgba(44,46,56,.66);
  --hair:rgba(255,255,255,.14);--shadow:0 10px 34px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.3);--accent:#0a84ff}
[data-theme="dark"] body{background:
  radial-gradient(42% 40% at 6% 8%,rgba(10,132,255,.24),transparent 72%),
  radial-gradient(40% 38% at 96% 4%,rgba(94,92,230,.22),transparent 72%),
  radial-gradient(46% 42% at 82% 96%,rgba(255,122,182,.16),transparent 72%),
  radial-gradient(44% 40% at 14% 92%,rgba(48,200,180,.16),transparent 72%),
  radial-gradient(38% 36% at 56% 44%,rgba(255,196,120,.10),transparent 72%),
  linear-gradient(160deg,#0d0f15,#111521)}
[data-theme="dark"] .topbar,[data-theme="dark"] .chatbar{background:rgba(20,22,30,.5)}
[data-theme="dark"] .btn:hover{background:rgba(70,74,86,.8)}
[data-theme="dark"] .nav button:hover{background:rgba(255,255,255,.08)}
</style>
</head>
<body>
<aside class="side">
  <div class="brand"><span class="dot">P</span><div>Prontera HQ<small>COMMAND CENTER</small></div></div>
  <nav class="nav" id="nav"></nav>
  <div class="side-foot" id="foot">เชื่อมต่อ…</div>
</aside>

<div class="mtop"><span class="dot">P</span><b>Prontera HQ</b><span class="spacer" style="flex:1"></span><span id="mtk" class="sub mono"></span></div>

<main class="main">
  <div class="topbar"><h1 id="ttl">ภาพรวม</h1><span class="sub" id="tsub"></span><span class="spacer"></span>
    <span class="tk"><span class="ring" id="tkring"></span><span id="tktxt">tokens</span></span>
    <button class="tbtn" id="themeBtn" aria-label="สลับธีม light / dark / auto"></button>
  </div>
  <div id="view"></div>
</main>

<nav class="mnav" id="mnav"></nav>

<script>
const KEY=(function(){try{const u=new URLSearchParams(location.search).get("key");if(u)localStorage.setItem("prontera_gkey",u);return u||localStorage.getItem("prontera_gkey")||"";}catch(_){return"";}})();
const LOCAL=["localhost","127.0.0.1",""];
const BACKEND=(location.protocol==="file:"||LOCAL.includes(location.hostname))?"":"https://pornchais-mac-mini.tail62b220.ts.net:8443";
const CEORE=/\/(set_model|set_schedule|set_project_cron|run_project|queue_add|queue_remove|no_claude|brief|agent|iris_run|vera_run)(\?|$)/;
function url(p){ if(KEY&&CEORE.test(p)&&p.indexOf("key=")<0) p+=(p.indexOf("?")>=0?"&":"?")+"key="+encodeURIComponent(KEY); return BACKEND+p; }
async function getJSON(p){ try{const r=await fetch(url(p));return r.ok?await r.json():null;}catch(_){return null;} }
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function avColor(s){const h=[...String(s)].reduce((a,c)=>a+c.charCodeAt(0),0)%360;return"linear-gradient(135deg,hsl("+h+",70%,58%),hsl("+((h+40)%360)+",70%,52%))";}
const fmtK=n=>n>=1e6?(n/1e6).toFixed(n>=1e7?0:1)+"M":n>=1e3?Math.round(n/1e3)+"k":""+Math.round(n);

const ICON={
  overview:'<path d="M3 13h8V3H3zM13 21h8V3h-8zM3 21h8v-6H3z"/>',
  projects:'<path d="M3 7l9-4 9 4-9 4-9-4zM3 7v10l9 4 9-4V7"/>',
  activity:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  chat:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  models:'<path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/>',
  work:'<path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  invest:'<path d="M3 3v18h18M7 14l4-4 4 4 5-6"/>',
  office:'<path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-3M9 9v.01M9 13v.01M9 17v.01"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  play:'<path d="M5 3l14 9-14 9z"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  x:'<path d="M18 6L6 18M6 6l12 12"/>',
  refresh:'<path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/>',
  bolt:'<path d="M13 2L3 14h9l-1 8 10-12h-9z"/>',
  sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
  moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>',
  auto:'<circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  bulb:'<path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.3 1 2.1V16h6v-.4c0-.8.4-1.5 1-2.1A6 6 0 0 0 12 3z"/>'
};
function ic(n,c){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"'+(c?' style="color:'+c+'"':'')+' aria-hidden="true">'+(ICON[n]||"")+'</svg>';}

const NAV=[
  ["overview","ภาพรวม","overview"],["projects","โปรเจค & Cron","projects"],["activity","Live Activity","activity"],
  ["chat","แชท","chat"],["search","ค้นหา","search"],["skills","สกิล (เรียนรู้)","bulb"],
  ["models","โมเดล & Token","models"],["work","สรุปงาน","work"],["invest","การลงทุน","invest"],
  ["office","Office view","office"]
];
const MNAV=NAV.map(function(n){return n[0];});   // mobile bottom-nav: all tabs, horizontally scrollable
let CUR="overview";
function buildNav(){
  document.getElementById("nav").innerHTML=NAV.map(n=>'<button data-v="'+n[0]+'">'+ic(n[2])+'<span>'+n[1]+'</span></button>').join("");
  document.getElementById("mnav").innerHTML=MNAV.map(v=>{const n=NAV.find(x=>x[0]===v);return '<button data-v="'+v+'">'+ic(n[2])+'<span>'+n[1].split(" ")[0]+'</span></button>';}).join("");
  document.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>go(b.dataset.v));
}
function go(v){
  CUR=v;
  document.querySelectorAll("[data-v]").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  const n=NAV.find(x=>x[0]===v)||NAV[0];
  document.getElementById("ttl").textContent=n[1];
  const R={overview:renderOverview,projects:renderProjects,activity:renderActivity,chat:renderChat,search:renderSearch,skills:renderSkills,models:renderModels,work:renderWork,invest:renderInvest,office:renderOffice};
  (R[v]||renderOverview)();
}
const V=()=>document.getElementById("view");

async function refreshTokens(){
  const d=await getJSON("/limits"); const foot=document.getElementById("foot");
  if(!d){ document.getElementById("tktxt").textContent="offline"; document.getElementById("tkring").style.background="var(--bad)"; foot.textContent="⚠ เชื่อมต่อ backend ไม่ได้"; return; }
  const c=d.claude||{}; const pc=c.limit?Math.round(100*c.remaining/c.limit):0;

const _mq=matchMedia("(prefers-color-scheme:dark)");
function applyTheme(){
  const t=localStorage.getItem("prontera_theme")||"auto";
  const dark = t==="dark" || (t==="auto" && _mq.matches);
  document.documentElement.setAttribute("data-theme", dark?"dark":"light");

  if(btn){ btn.innerHTML=ic(t==="auto"?"auto":dark?"moon":"sun"); btn.title="ธีม: "+t+" (คลิกเพื่อสลับ)"; }
}
function cycleTheme(){ const cur=localStorage.getItem("prontera_theme")||"auto"; const nx={auto:"light",light:"dark",dark:"auto"}[cur]; localStorage.setItem("prontera_theme",nx); applyTheme(); toast("ธีม: "+nx); }
