<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Prontera HQ — Command Center</title>
<style>
:root{
  --text:#1d1d1f; --muted:#5f6168; --faint:#8a8d94;
  --accent:#0a84ff; --accent-ink:#fff; --indigo:#5e5ce6;
  --ok:#30a46c; --warn:#e08600; --bad:#e5484d; --okdot:#34c759;
  --radius:18px; --gap:16px;
  --glass:rgba(255,255,255,.52); --glass-2:rgba(255,255,255,.66); --glass-3:rgba(255,255,255,.78);
  --hair:rgba(255,255,255,.6); --line:rgba(60,60,67,.14);
  --shadow:0 10px 34px rgba(20,28,46,.12),0 2px 8px rgba(20,28,46,.07);
  --blur:saturate(180%) blur(24px);
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{display:grid;grid-template-columns:248px 1fr;grid-template-rows:100dvh;
  background:
    radial-gradient(42% 40% at 6% 8%,rgba(10,132,255,.16),transparent 72%),
    radial-gradient(40% 38% at 96% 4%,rgba(94,92,230,.15),transparent 72%),
    radial-gradient(46% 42% at 82% 96%,rgba(255,122,182,.13),transparent 72%),
    radial-gradient(44% 40% at 14% 92%,rgba(48,200,180,.13),transparent 72%),
    radial-gradient(38% 36% at 56% 44%,rgba(255,196,120,.10),transparent 72%),
    radial-gradient(50% 50% at 40% 20%,rgba(120,170,255,.10),transparent 75%),
    linear-gradient(160deg,#f4f6fb,#e9ecf5);
  background-attachment:fixed}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--mono)}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.glass{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);box-shadow:var(--shadow)}

/* ── sidebar ── */
.side{background:var(--glass-2);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-right:1px solid var(--hair);display:flex;flex-direction:column;min-height:0}
.brand{display:flex;align-items:center;gap:11px;padding:20px 18px 14px;font-weight:600;font-size:16px;letter-spacing:.2px}
.brand .dot{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#0a84ff,#5e5ce6);display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;box-shadow:0 4px 12px rgba(10,132,255,.4)}
.brand small{display:block;font-weight:400;font-size:11px;color:var(--faint);letter-spacing:.6px}
.nav{display:flex;flex-direction:column;gap:3px;padding:8px 12px;overflow-y:auto;flex:1;min-height:0}
.nav button{display:flex;align-items:center;gap:12px;width:100%;background:none;border:0;color:var(--muted);padding:11px 13px;border-radius:13px;font-size:14.5px;font-weight:500;text-align:left;transition:background .18s,color .18s}
.nav button svg{width:19px;height:19px;flex:0 0 19px}
.nav button:hover{background:rgba(255,255,255,.55);color:var(--text)}
.nav button.on{background:rgba(10,132,255,.14);color:var(--accent)}
.side-foot{padding:13px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--faint)}

/* ── main ── */
.main{overflow-y:auto;min-height:0}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:15px 24px;background:rgba(255,255,255,.5);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-bottom:1px solid var(--hair)}
.topbar h1{margin:0;font-size:19px;font-weight:600;letter-spacing:-.2px}
.topbar .sub{color:var(--muted);font-size:13px}
.topbar .spacer{flex:1}
.tk{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);padding:7px 13px;border-radius:999px;box-shadow:var(--shadow)}
.tk b{color:var(--text);font-weight:600}
.tk .ring{width:9px;height:9px;border-radius:50%;background:var(--okdot)}
.tbtn{display:grid;place-items:center;width:38px;height:38px;border-radius:999px;background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);color:var(--text);box-shadow:var(--shadow);transition:color .15s}
.tbtn:hover{color:var(--accent)}
.tbtn svg{width:18px;height:18px}
.wrap{padding:24px;max-width:1180px}
.hd{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.02em;margin:28px 0 13px}
.hd:first-child{margin-top:6px}

.grid{display:grid;gap:var(--gap)}
.g-kpi{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.g-cards{grid-template-columns:repeat(auto-fill,minmax(256px,1fr))}
.card,.kpi,.ag,.act,.qi,.ws{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);box-shadow:var(--shadow)}
.card{border-radius:var(--radius);padding:18px}
.kpi{border-radius:var(--radius);padding:16px 18px}
.kpi .l{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
.kpi .v{font-size:29px;font-weight:700;margin-top:6px;letter-spacing:-1px}
.kpi .v small{font-size:13px;font-weight:500;color:var(--muted)}
.kpi svg{width:15px;height:15px;color:var(--accent)}

.ag{border-radius:var(--radius);padding:16px}
.ag-top{display:flex;align-items:center;gap:12px}
.ag-av{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-weight:700;font-size:15px;color:#fff;flex:0 0 40px;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.ag-nm{font-weight:600;font-size:14.5px}
.ag-rl{font-size:12.5px;color:var(--muted)}
.ag-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.chip{font-size:11.5px;font-weight:500;padding:3px 10px;border-radius:999px;background:rgba(120,120,128,.12);color:var(--muted);border:1px solid var(--line)}
.chip.live{background:rgba(48,164,108,.16);color:var(--ok);border-color:rgba(48,164,108,.3)}
.chip.mdl{background:rgba(10,132,255,.13);color:var(--accent);border-color:rgba(10,132,255,.26)}
.chip.mono{font-family:var(--mono);font-size:11px}
.clk{cursor:pointer;transition:transform .15s ease,box-shadow .15s ease}
.clk:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(20,28,46,.18),0 4px 10px rgba(20,28,46,.1)}

.tkrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.tkrow:last-child{border-bottom:0}
.tkrow .nm{width:98px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.tkrow .st{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.bar{flex:1;height:8px;background:rgba(120,120,128,.16);border-radius:999px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#0a84ff,#5e5ce6)}
.tkrow .pc{width:74px;text-align:right;font-size:12px;color:var(--muted)}

.row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.row:last-child{border-bottom:0}
.row .lbl{flex:1;min-width:150px;font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:10px}
.ctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
input,select,textarea{background:var(--glass-3);color:var(--text);border:1px solid var(--line);border-radius:11px;padding:9px 11px;font:inherit;font-size:14px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
input[type=time]{padding:8px 10px}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(10,132,255,.2)}
input:disabled{opacity:.4}
.num{width:64px}
.sw{position:relative;width:46px;height:28px;flex:0 0 46px}
.sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
.sw .tr{position:absolute;inset:0;background:rgba(120,120,128,.22);border-radius:999px;transition:.22s}
.sw .tr::after{content:"";position:absolute;left:2px;top:2px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.28);transition:.22s}
.sw input:checked + .tr{background:var(--okdot)}
.sw input:checked + .tr::after{transform:translateX(18px)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--glass-3);color:var(--text);border:1px solid var(--hair);border-radius:12px;padding:9px 15px;font-size:13.5px;font-weight:500;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:transform .12s,background .15s;box-shadow:0 2px 8px rgba(20,28,46,.08)}
.btn:hover{background:#fff}
.btn:active{transform:scale(.97)}
.btn svg{width:15px;height:15px}
.btn.run{background:rgba(10,132,255,.14);border-color:rgba(10,132,255,.32);color:var(--accent)}
.btn.pri{background:var(--accent);color:#fff;border-color:transparent;font-weight:600;box-shadow:0 4px 14px rgba(10,132,255,.36)}
.btn:disabled{opacity:.45;cursor:default}
.muted{color:var(--muted)}.faint{color:var(--faint)}.fs12{font-size:12px}.fs13{font-size:13px}
.sub{font-size:12px;color:var(--faint);font-weight:400}
.empty{color:var(--faint);font-size:13.5px;padding:22px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius);background:rgba(255,255,255,.35)}
.flex{display:flex;align-items:center;gap:10px}.wrapflex{flex-wrap:wrap}

.act{border-radius:14px;padding:13px 15px;margin-bottom:11px;border-left:3px solid var(--accent)}
.act.stale{border-left-color:var(--warn);opacity:.78}
.act .ph{font-size:13px;font-weight:600;color:var(--accent)}
.act .who{font-weight:600;text-transform:capitalize}

.qi{border-radius:14px;padding:13px 15px;margin-bottom:11px}
.qi .t{font-weight:500;margin:5px 0}
.qi-icb{padding:6px;width:28px;height:28px;flex:0 0 28px;border-radius:9px;justify-content:center}
.qi-icb svg{width:14px;height:14px;margin:0}
.qi-editta{margin-top:2px}
.ws{border-radius:14px;padding:14px 16px;margin-bottom:11px}
.verdict{font-size:11.5px;padding:3px 10px;border-radius:999px;font-weight:600}
.v-ok{background:rgba(48,164,108,.16);color:var(--ok)}
.v-fix{background:rgba(229,72,77,.15);color:var(--bad)}
.v-unclear{background:rgba(224,134,0,.16);color:var(--warn)}

.chatwrap{display:flex;flex-direction:column;height:calc(100dvh - 60px)}
.msgs{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:13px}
.msg{max-width:760px;padding:12px 16px;border-radius:20px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;box-shadow:0 2px 10px rgba(20,28,46,.08)}
.msg.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:6px}
.msg.bot{align-self:flex-start;background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);border-bottom-left-radius:6px}
.msg .nm{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.chatbar{display:flex;gap:10px;padding:15px 24px;border-top:1px solid var(--hair);background:rgba(255,255,255,.5);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);align-items:flex-end}
.chatbar select{flex:0 0 auto}.chatbar input{flex:1}

.office{position:relative;height:calc(100dvh - 60px);width:100%}
.office iframe{width:100%;height:100%;border:0;background:#0a0e14;display:block}
.offull{position:absolute;top:12px;right:16px;z-index:5;font-size:12.5px;font-weight:500;color:var(--text);background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);box-shadow:var(--shadow);padding:7px 13px;border-radius:999px}
@media (max-width:860px){ .office{height:calc(100dvh - 122px)} }

.page{display:none}.page.on{display:block}

.mtop{display:none}
@media (max-width:860px){
  body{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  .side{display:none}
  .mtop{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--glass-2);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-bottom:1px solid var(--hair);position:sticky;top:0;z-index:30}
  .mtop .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#0a84ff,#5e5ce6);display:grid;place-items:center;color:#fff;font-weight:700}
  .mtop b{font-size:15px}
  .topbar{padding:13px 16px}.topbar h1{font-size:17px}
  .wrap{padding:16px}
  .mnav{display:flex;position:sticky;bottom:0;z-index:30;background:var(--glass-2);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-top:1px solid var(--hair);padding:6px 6px 8px;gap:2px;overflow-x:auto;scrollbar-width:none}
  .mnav::-webkit-scrollbar{display:none}
  .mnav button{flex:0 0 auto;min-width:64px;background:none;border:0;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 6px;font-size:10px;font-weight:500;border-radius:11px;min-height:50px;white-space:nowrap}
  .mnav button svg{width:22px;height:22px}
  .mnav button.on{color:var(--accent)}
  input,select,textarea{font-size:16px}
  .btn,.btn.run{min-height:44px}
  .row .lbl{min-width:0;flex:1 1 100%}
  .msg{max-width:88%}
  .cmdk-openbtn span{display:none}
  .cmdk-overlay{padding-top:8vh}
}
@media (min-width:861px){ .mnav{display:none} }
@media (prefers-reduced-motion:reduce){ *{transition:none!important} }

/* ── command palette (⌘K) ── */
.cmdk-openbtn{display:flex;align-items:center;gap:6px;background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--hair);color:var(--muted);padding:7px 12px;border-radius:999px;box-shadow:var(--shadow);font:inherit;font-size:12.5px;transition:color .15s}
.cmdk-openbtn:hover{color:var(--accent)}
.cmdk-openbtn svg{width:14px;height:14px}
.cmdk-openbtn b{font-family:var(--mono);font-weight:600;color:var(--text)}
.cmdk-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:12vh;background:rgba(10,14,24,.38);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.cmdk-overlay.on{display:flex}
.cmdk-modal{width:92%;max-width:560px;border-radius:20px;overflow:hidden;background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid rgba(10,132,255,.28);box-shadow:0 24px 70px rgba(10,132,255,.16),0 8px 26px rgba(0,0,0,.32)}
.cmdk-inputwrap{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
.cmdk-inputwrap svg{width:18px;height:18px;flex:0 0 18px;color:var(--accent)}
.cmdk-inputwrap input{flex:1;border:0;background:transparent;font:inherit;font-size:16px;color:var(--text);padding:2px 0}
.cmdk-inputwrap input:focus{outline:none;box-shadow:none}
.cmdk-hintkey{font-size:11px;color:var(--faint);border:1px solid var(--line);border-radius:6px;padding:2px 6px;font-family:var(--mono)}
.cmdk-list{max-height:min(360px,50vh);overflow-y:auto;padding:8px}
.cmdk-item{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:12px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer}
.cmdk-item svg{width:17px;height:17px;flex:0 0 17px;color:var(--muted)}
.cmdk-item.sel{background:rgba(10,132,255,.15);color:var(--accent)}
.cmdk-item.sel svg{color:var(--accent)}
.cmdk-empty{padding:26px 18px;text-align:center;color:var(--faint);font-size:13.5px}
.cmdk-group{padding:10px 13px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.cmdk-item.hist{flex-direction:column;align-items:stretch;gap:3px}
.cmdk-item.hist .hh{display:flex;align-items:center;gap:8px}
.cmdk-item.hist .hh b{flex:1;min-width:0;font-weight:500;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmdk-item.hist .hs{font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── agent memory & learnings panel (m4) ── */
.agmem-overlay{position:fixed;inset:0;z-index:210;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(10,14,24,.42);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.agmem-overlay.on{display:flex}
.agmem-modal{position:relative;width:100%;max-width:540px;max-height:82vh;overflow-y:auto;border-radius:22px;padding:22px;background:var(--glass-3);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid rgba(10,132,255,.28);box-shadow:0 24px 70px rgba(10,132,255,.16),0 8px 26px rgba(0,0,0,.32)}
.agmem-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:var(--glass-3);border:1px solid var(--hair);display:grid;place-items:center;color:var(--muted);font-size:14px;line-height:1;box-shadow:var(--shadow)}
.agmem-close:hover{color:var(--accent)}

:root[data-theme="dark"]{--text:#f2f3f5;--muted:#a4a7b0;--faint:#7e828c;--line:rgba(255,255,255,.12);
  --glass:rgba(28,30,38,.5);--glass-2:rgba(28,30,38,.62);--glass-3:rgba(44,46,56,.66);
  --hair:rgba(255,255,255,.14);--shadow:0 10px 34px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.3);--accent:#0a84ff}
[data-theme="dark"] body{background:
  radial-gradient(42% 40% at 6% 8%,rgba(10,132,255,.24),transparent 72%),
  radial-gradient(40% 38% at 96% 4%,rgba(94,92,230,.22),transparent 72%),
  radial-gradient(46% 42% at 82% 96%,rgba(255,122,182,.16),transparent 72%),
  radial-gradient(44% 40% at 14% 92%,rgba(48,200,180,.16),transparent 72%),
  radial-gradient(38% 36% at 56% 44%,rgba(255,196,120,.10),transparent 72%),
  linear-gradient(160deg,#0d0f15,#111521)}
[data-theme="dark"] .topbar,[data-theme="dark"] .chatbar{background:rgba(20,22,30,.5)}
[data-theme="dark"] .btn:hover{background:rgba(70,74,86,.8)}
[data-theme="dark"] .nav button:hover{background:rgba(255,255,255,.08)}
</style>
</head>
<body>
<aside class="side">
  <div class="brand"><span class="dot">P</span><div>Prontera HQ<small>COMMAND CENTER</small></div></div>
  <nav class="nav" id="nav"></nav>
  <div class="side-foot" id="foot">เชื่อมต่อ…</div>
</aside>

<div class="mtop"><span class="dot">P</span><b>Prontera HQ</b><span class="spacer" style="flex:1"></span><span id="mtk" class="sub mono"></span></div>

<main class="main">
  <div class="topbar"><h1 id="ttl">ภาพรวม</h1><span class="sub" id="tsub"></span><span class="spacer"></span>
    <button class="cmdk-openbtn" id="cmdkOpenBtn" type="button" aria-label="เปิด command palette (⌘K)" title="Command palette — ⌘K / Ctrl+K"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><span>ค้นหา/ไปที่…</span><b>⌘K</b></button>
    <span class="tk"><span class="ring" id="tkring"></span><span id="tktxt">tokens</span></span>
    <button class="tbtn" id="themeBtn" aria-label="สลับธีม light / dark / auto"></button>
  </div>
  <div id="view"></div>
</main>

<nav class="mnav" id="mnav"></nav>

<div class="cmdk-overlay" id="cmdkOverlay" role="dialog" aria-modal="true" aria-label="Command palette">
  <div class="cmdk-modal">
    <div class="cmdk-inputwrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="cmdkInput" type="text" placeholder="ไปที่หัวข้อ… (Overview, Chat, Models…)" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="พิมพ์เพื่อค้นหาหัวข้อ" />
      <span class="cmdk-hintkey">Esc</span>
    </div>
    <div class="cmdk-list" id="cmdkList"></div>
  </div>
</div>

<div class="agmem-overlay" id="agmemOverlay" role="dialog" aria-modal="true" aria-label="Memory &amp; learnings">
  <div class="agmem-modal">

<script>
const KEY=(function(){try{const u=new URLSearchParams(location.search).get("key");if(u)localStorage.setItem("prontera_gkey",u);return u||localStorage.getItem("prontera_gkey")||"";}catch(_){return"";}})();
const LOCAL=["localhost","127.0.0.1",""];
const BACKEND=(location.protocol==="file:"||LOCAL.includes(location.hostname))?"":"https://pornchais-mac-mini.tail62b220.ts.net:8443";
const CEORE=/\/(set_model|set_schedule|set_project_cron|run_project|queue_add|queue_remove|roadmap_set|roadmap_clear|no_claude|brief|agent|iris_run|vera_run)(\?|$)/;
function url(p){ if(KEY&&CEORE.test(p)&&p.indexOf("key=")<0) p+=(p.indexOf("?")>=0?"&":"?")+"key="+encodeURIComponent(KEY); return BACKEND+p; }
async function getJSON(p){ try{const r=await fetch(url(p));return r.ok?await r.json():null;}catch(_){return null;} }
async function postJSON(p,body){ try{const r=await fetch(url(p),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})});return r.ok?await r.json().catch(()=>({ok:true})):null;}catch(_){return null;} }
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function avColor(s){const h=[...String(s)].reduce((a,c)=>a+c.charCodeAt(0),0)%360;return"linear-gradient(135deg,hsl("+h+",70%,58%),hsl("+((h+40)%360)+",70%,52%))";}
const fmtK=n=>n>=1e6?(n/1e6).toFixed(n>=1e7?0:1)+"M":n>=1e3?Math.round(n/1e3)+"k":""+Math.round(n);

function ic(n,c){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"'+(c?' style="color:'+c+'"':'')+' aria-hidden="true">'+(ICON[n]||"")+'</svg>';}

const NAV=[

  ["chat","แชท","chat"],["search","ค้นหา","search"],["skills","สกิล (เรียนรู้)","bulb"],

  ["office","Office view","office"]

const MNAV=NAV.map(function(n){return n[0];});   // mobile bottom-nav: all tabs, horizontally scrollable
let CUR="overview";
function buildNav(){
  document.getElementById("nav").innerHTML=NAV.map(n=>'<button data-v="'+n[0]+'">'+ic(n[2])+'<span>'+n[1]+'</span></button>').join("");

function go(v){
  CUR=v;
  document.querySelectorAll("[data-v]").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  const n=NAV.find(x=>x[0]===v)||NAV[0];

  const R={overview:renderOverview,projects:renderProjects,activity:renderActivity,chat:renderChat,search:renderSearch,skills:renderSkills,profile:renderProfile,models:renderModels,work:renderWork,invest:renderInvest,office:renderOffice};

}

async function refreshTokens(){
  const d=await getJSON("/limits"); const foot=document.getElementById("foot");
  if(!d){ document.getElementById("tktxt").textContent="offline"; document.getElementById("tkring").style.background="var(--bad)"; foot.textContent="⚠ เชื่อมต่อ backend ไม่ได้"; return; }
  const c=d.claude||{}; const pc=c.limit?Math.round(100*c.remaining/c.limit):0;
  document.getElementById("tktxt").innerHTML="Claude <b>"+pc+"%</b>";
  document.getElementById("mtk").textContent="Claude "+pc+"%";
  document.getElementById("tkring").style.background=pc>20?"var(--okdot)":pc>0?"var(--warn)":"var(--bad)";
  const live=Object.values(d).filter(b=>!b.exhausted).length;
  foot.innerHTML="● "+live+"/"+Object.keys(d).length+" backends ออนไลน์";
  return d;
}

async function renderOverview(){
  V().innerHTML='<div class="wrap"><div class="grid g-kpi" id="kpi"></div><div class="hd">ทีม (agents)</div><div class="grid g-cards" id="rost"><div class="empty">กำลังโหลด…</div></div><div class="hd">Token / Mana</div><div class="card" id="tok"></div></div>';
  const [dash,act,lim]=await Promise.all([getJSON("/dashboard"),getJSON("/activity"),getJSON("/limits")]);
  const agents=(dash&&dash.agents)||[]; const working=act&&typeof act==="object"?act:{};
  const nWork=Object.keys(working).length;
  const kpi=[["agents ทั้งหมด",agents.length,"overview"],["กำลังทำงาน",nWork,"activity"],["งานสะสม (tickets)",(dash&&dash.ticketCount)||0,"work"],["backends ออนไลน์",lim?Object.values(lim).filter(b=>!b.exhausted).length:"–","models"]];

  const busy={}; Object.values(working).forEach(a=>{if(a.agent)busy[a.agent]=a.phase;});
  document.getElementById("rost").innerHTML=agents.map(a=>{
    const ph=busy[a.id];
    return '<div class="ag clk" data-agent="'+esc(a.id)+'" title="ดูความจำ/สกิลของ '+esc(a.name||a.id)+'"><div class="ag-top"><div class="ag-av" style="background:'+avColor(a.id)+'">'+esc((a.name||a.id)[0].toUpperCase())+'</div><div><div class="ag-nm">'+esc(a.name||a.id)+'</div><div class="ag-rl">'+esc(a.role||"")+'</div></div></div><div class="ag-meta"><span class="chip mdl">'+esc(a.backend||"claude")+(a.model?" · "+esc(a.model):"")+'</span>'+(ph?'<span class="chip live">● '+esc(ph)+'</span>':'')+'<span class="chip">'+(a.tickets||0)+' งาน</span></div></div>';
  }).join("")||'<div class="empty">ไม่มีข้อมูล agent</div>';
  document.getElementById("rost").querySelectorAll("[data-agent]").forEach(function(el){ el.onclick=function(){ openAgentMemory(el.dataset.agent); }; });
  renderTokBars(document.getElementById("tok"),lim);
}
function renderTokBars(box,lim){
  if(!box)return; if(!lim){box.innerHTML='<div class="empty">เชื่อมต่อ backend ไม่ได้</div>';return;}
  box.innerHTML=Object.entries(lim).map(([b,v])=>{
    const pc=v.limit?Math.round(100*v.remaining/v.limit):0;
    const col=v.exhausted?"var(--bad)":pc>20?"var(--okdot)":"var(--warn)";
    return '<div class="tkrow"><div class="nm"><span class="st" style="background:'+col+'"></span>'+esc(b)+'</div><div class="bar"><i style="width:'+pc+'%"></i></div><div class="pc">'+pc+'% · '+fmtK(v.remaining||0)+'</div></div>';
  }).join("");
}

const PROJ=[["hotel-pms","hotelpms"],["hostgate","hostgate"],["discord-bot","discordbot"],["prontera","prontera"]];
async function loadRoadmap(project){
  var box=document.getElementById("rmbox"); if(!box) return;
  var d=await getJSON("/roadmap?project="+encodeURIComponent(project));
  if(!d||!d.title||!(d.milestones&&d.milestones.length)){ box.innerHTML='<div class="empty">ยังไม่มีโปรเจคใหญ่สำหรับ '+esc(project)+' — ตั้งด้านล่างเพื่อให้ทีมทำต่อกันทุกรอบ</div>'; return; }
  var ms=d.milestones, done=ms.filter(function(m){return m.done;}).length, pct=Math.round(100*done/ms.length), nf=false;
  box.innerHTML='<div class="card"><div class="flex wrapflex" style="margin-bottom:6px"><b style="font-size:15px">'+esc(d.title)+'</b><span class="chip mdl">'+done+'/'+ms.length+'</span>'
    +(done<ms.length?'<button class="btn" style="margin-left:auto;padding:5px 10px" id="rmclr">ล้าง</button>':'<span class="verdict v-ok" style="margin-left:auto">เสร็จครบ ✓</span>')+'</div>'
    +(d.goal?'<div class="muted fs13" style="margin-bottom:10px">'+esc(d.goal)+'</div>':'')
    +'<div class="bar" style="height:8px;margin-bottom:12px"><i style="width:'+pct+'%"></i></div>'
    +ms.map(function(m){var isN=!m.done&&!nf; if(isN)nf=true;
      return '<div class="flex" style="padding:6px 0;border-bottom:1px solid var(--line)"><span style="width:22px;flex:0 0 22px;text-align:center">'+(m.done?'<span style="color:var(--ok)">✓</span>':(isN?'<span style="color:var(--accent)">▸</span>':'○'))+'</span><span'+(m.done?' class="muted" style="text-decoration:line-through"':(isN?' style="font-weight:600"':' class="muted"'))+'>'+esc(m.title)+'</span>'+(isN?'<span class="chip live" style="margin-left:auto">ทำต่อไป</span>':'')+'</div>';
    }).join("")+'</div>';
  var clr=document.getElementById("rmclr"); if(clr) clr.onclick=async function(){ await getJSON("/roadmap_clear?project="+encodeURIComponent(project)); loadRoadmap(project); };
}

      +'<input id="rg" placeholder="เป้าหมาย/วิสัยทัศน์ (goal)" style="width:100%;margin-bottom:8px"/>'

      +'<div class="ctl" style="margin-top:8px"><button class="btn pri" id="rsave">'+ic("plus")+'ตั้งเป็นโปรเจคใหญ่</button><span class="sub" id="rmsg"></span></div></div>'

    return '<div class="card" style="margin-bottom:11px"><div class="row" style="border:0;padding:0">'

      +'<div class="ctl"><input type="time" data-tm="'+p+'"'+((!en||ev>0)?" disabled":"")+' value="'+esc(tv)+'"/>'
      +'<span class="sub">ทุกๆ</span><input class="num" type="number" min="0" max="168" data-ev="'+p+'"'+(!en?" disabled":"")+' value="'+ev+'"/><span class="sub">ชม.</span>'

  document.querySelectorAll("[data-en]").forEach(cb=>cb.onchange=async()=>{const p=cb.dataset.en,on=cb.checked;await getJSON("/set_project_cron?project="+encodeURIComponent(p)+"&enabled="+(on?1:0));const t=document.querySelector('[data-tm="'+p+'"]'),e=document.querySelector('[data-ev="'+p+'"]');if(e)e.disabled=!on;if(t)t.disabled=!on||((parseFloat(e&&e.value||0)||0)>0);});

}

// per-agent isolation + health panel — backend endpoint not implemented yet, see comment above
async function renderHealthCard(agents){
  const box=document.getElementById("isohealth"),hint=document.getElementById("isohint");
  if(!box)return;
  let rows=await getJSON("/isolation_status");
  if(!Array.isArray(rows)||!rows.length){
    const h=await getJSON("/health");
    rows=Array.isArray(h)&&h.length?h:null;
  }
  const list=Array.isArray(agents)?agents:[];
  if(!rows||!rows.length){
    if(hint)hint.textContent="ยังไม่มีข้อมูล isolation — รอ backend เปิด endpoint /isolation_status";
    box.innerHTML=list.length?list.map(a=>healthCardHTML({agent:a.id,backend:a.backend||"claude",isolationMode:null,healthy:null,lastCheck:null},a)).join("")
      :'<div class="empty">ยังไม่มีข้อมูล isolation — รอ backend เปิด endpoint /isolation_status</div>';
    return;
  }
  if(hint)hint.textContent="";
  box.innerHTML=rows.map(r=>healthCardHTML(r,list.find(a=>a.id===r.agent))).join("")||'<div class="empty">ยังไม่มีข้อมูล isolation</div>';
}
function healthCardHTML(r,a){
  const nm=(a&&(a.name||a.id))||r.agent||"–";
  const dotCol=r.healthy===true?"var(--okdot)":r.healthy===false?"var(--bad)":"var(--warn)";
  const stTxt=r.healthy===true?"ok":r.healthy===false?"bad":"ไม่ทราบ";
  const isoTxt=r.isolationMode||"ไม่ทราบ";
  const isoCls=r.isolationMode?"chip mdl":"chip";
  const lastChk=r.lastCheck?esc(String(r.lastCheck).replace("T"," ")):"–";
  return '<div class="ag"><div class="ag-top"><div class="ag-av" style="background:'+avColor(r.agent||nm)+'">'+esc(String(nm)[0]||"?").toUpperCase()+'</div>'
    +'<div><div class="ag-nm">'+esc(nm)+'</div><div class="ag-rl">'+esc(r.backend||(a&&a.backend)||"claude")+'</div></div></div>'
    +'<div class="ag-meta"><span class="'+isoCls+'">isolation: '+esc(isoTxt)+'</span><span class="chip mono">last check: '+lastChk+'</span></div>'
    +'<div class="tkrow" style="padding-top:8px;margin-top:10px;border-top:1px solid var(--line)"><div class="nm"><span class="st" style="background:'+dotCol+'"></span>health</div><div class="pc" style="flex:1;text-align:right">'+esc(stTxt)+'</div></div>'
    +'</div>';
}

// ── skill row markup + delete/edit wiring — shared by renderSkills() (Skills nav list) and
// renderAgentMemoryBody() (per-agent memory modal) so both surfaces stay in sync. ──
function skillRowHtml(aid,s){
  const name=esc(s.name||""), body=esc(s.body||"");
  return '<div class="qi" style="margin:6px 0" data-agent="'+esc(aid)+'" data-name="'+name+'">'
    +'<div class="flex wrapflex" style="justify-content:space-between;gap:8px">'
      +'<div class="flex wrapflex" style="flex:1;min-width:0"><b>'+name+'</b>'+(s.by==="learned"?'<span class="verdict v-ok">⚡ learned</span>':'<span class="chip">'+esc(s.by||"")+'</span>')+(s.when?'<span class="sub">'+esc(s.when)+'</span>':'')+'</div>'
      +'<div class="flex" style="gap:4px;flex:0 0 auto">'
        +'<button class="btn qi-icb" data-skedit title="แก้ไขสกิลนี้">'+ic("edit")+'</button>'
        +'<button class="btn qi-icb" data-skdel title="ลบสกิลนี้">'+ic("x")+'</button>'
      +'</div>'
    +'</div>'
    +'<div class="muted fs13 qi-body" style="margin-top:4px">'+body+'</div>'
    +'<div class="qi-editbox" style="display:none;margin-top:8px">'
      +'<textarea class="qi-editta" rows="3" style="width:100%">'+body+'</textarea>'
      +'<div class="ctl" style="margin-top:6px"><button class="btn pri qi-savebtn">'+ic("plus")+'บันทึก</button><button class="btn qi-cancelbtn">ยกเลิก</button></div>'
    +'</div>'
    +'<div class="sub qi-msg" style="margin-top:4px"></div>'
  +'</div>';
}
function wireSkillRows(container,onChanged){
  container.querySelectorAll(".qi[data-name]").forEach(function(row){
    const aid=row.dataset.agent, name=row.dataset.name;
    const editBtn=row.querySelector("[data-skedit]"), delBtn=row.querySelector("[data-skdel]");
    const editbox=row.querySelector(".qi-editbox"), bodyEl=row.querySelector(".qi-body");
    const msg=row.querySelector(".qi-msg"), saveBtn=row.querySelector(".qi-savebtn"), cancelBtn=row.querySelector(".qi-cancelbtn"), ta=row.querySelector(".qi-editta");
    if(editBtn) editBtn.onclick=function(e){
      e.stopPropagation();
      const opening=editbox.style.display==="none";
      editbox.style.display=opening?"block":"none";
      if(bodyEl) bodyEl.style.display=opening?"none":"";
      if(opening&&ta) ta.focus();
    };
    if(cancelBtn) cancelBtn.onclick=function(e){ e.stopPropagation(); editbox.style.display="none"; if(bodyEl) bodyEl.style.display=""; };
    if(saveBtn) saveBtn.onclick=async function(e){
      e.stopPropagation();
      const newBody=(ta.value||"").trim();
      if(msg) msg.textContent="กำลังบันทึก…";
      // NOTE: overwriting-by-name assumes the backend upserts a skill keyed on (agent,name) — i.e.
      // POSTing the same name again replaces the existing body instead of appending a duplicate row.
      // /skills and /agent_memory may need server-side support for this upsert semantic.
      let r=await postJSON("/skills",{agent:aid,name:name,body:newBody});
      if(!r) r=await postJSON("/agent_memory",{agent:aid,name:name,note:newBody});
      if(r){ toast("แก้ไขสกิลแล้ว"); onChanged(); }
      else if(msg){ msg.textContent="✕ บันทึกไม่สำเร็จ (endpoint ยังไม่พร้อม)"; }
    };
    if(delBtn) delBtn.onclick=async function(e){
      e.stopPropagation();
      if(msg) msg.textContent="กำลังลบ…";
      let r=await postJSON("/skill_remove",{agent:aid,name:name});
      if(!r) r=await postJSON("/skills_remove",{agent:aid,name:name});
      if(r){ toast("ลบสกิลแล้ว"); onChanged(); }
      else if(msg){ msg.textContent="✕ ลบไม่สำเร็จ (endpoint ยังไม่พร้อม)"; }
    };
  });
}

// ── m4: per-agent "Memory & learnings" panel — opened from the roster card (Overview) or the agent header row (Skills) ──
async function openAgentMemory(agentId){
  const ov=document.getElementById("agmemOverlay"), body=document.getElementById("agmemBody");
  ov.classList.add("on"); body.innerHTML='<div class="empty">กำลังโหลด…</div>';
  const [dash,sk]=await Promise.all([getJSON("/dashboard"),getJSON("/skills")]);
  const agents=(dash&&dash.agents)||[];
  const a=agents.find(function(x){return x.id===agentId;})||{id:agentId,name:agentId};
  const mySkills=(sk&&typeof sk==="object"&&Array.isArray(sk[agentId]))?sk[agentId]:[];
  renderAgentMemoryBody(a,mySkills);
}
function renderAgentMemoryBody(a,sk){
  const body=document.getElementById("agmemBody"); if(!body) return;
  body.innerHTML='<div class="flex" style="margin-bottom:14px"><div class="ag-av" style="width:44px;height:44px;border-radius:13px;font-size:17px;background:'+avColor(a.id)+'">'+esc((a.name||a.id)[0].toUpperCase())+'</div><div><div class="ag-nm" style="font-size:16px">'+esc(a.name||a.id)+'</div><div class="ag-rl">'+esc(a.role||"")+'</div></div></div>'
    +'<div class="ag-meta" style="margin-bottom:18px"><span class="chip mdl">'+esc(a.backend||"claude")+(a.model?" · "+esc(a.model):"")+'</span><span class="chip">'+(a.tickets||0)+' งาน</span></div>'
    +'<div class="hd" style="margin:0 0 10px">สกิลที่เรียนรู้แล้ว <span class="sub">— ⚡ = เรียนจากงานจริงที่ CI ผ่าน</span></div>'
    +(sk.length
      ? sk.map(function(s){return skillRowHtml(a.id,s);}).join("")
      : '<div class="empty">ยังไม่มีสกิลที่บันทึกไว้</div>')
    +'<div class="card" style="margin-top:16px"><div class="sub" style="margin-bottom:8px">จดจำไว้ / persist this — โน้ตสั้นๆ ให้ '+esc(a.name||a.id)+'</div>'
    +'<textarea id="amnote" rows="3" placeholder="พิมพ์สิ่งที่อยากให้ '+esc(a.name||a.id)+' จำไว้…" style="width:100%"></textarea>'
    +'<div class="ctl" style="margin-top:8px"><button class="btn pri" id="amsave">'+ic("plus")+'จดจำไว้ / persist this</button><span class="sub" id="ammsg"></span></div></div>';
  wireSkillRows(body, function(){ openAgentMemory(a.id); });
  const btn=document.getElementById("amsave");
  if(btn) btn.onclick=async function(){
    const msg=document.getElementById("ammsg"), noteEl=document.getElementById("amnote"), note=(noteEl.value||"").trim();
    if(!note){ msg.textContent="พิมพ์โน้ตก่อน"; return; }
    msg.textContent="กำลังบันทึก…";
    let r=await postJSON("/agent_memory",{agent:a.id,note:note});
    if(!r) r=await postJSON("/skills",{agent:a.id,note:note});
    if(r){ toast("บันทึกแล้ว"); openAgentMemory(a.id); }
    else { msg.textContent="✕ บันทึกไม่สำเร็จ (endpoint ยังไม่พร้อม)"; }
  };
}

const _mq=matchMedia("(prefers-color-scheme:dark)");
function applyTheme(){
  const t=localStorage.getItem("prontera_theme")||"auto";
  const dark = t==="dark" || (t==="auto" && _mq.matches);
  document.documentElement.setAttribute("data-theme", dark?"dark":"light");
  const btn=document.getElementById("themeBtn");
  if(btn){ btn.innerHTML=ic(t==="auto"?"auto":dark?"moon":"sun"); btn.title="ธีม: "+t+" (คลิกเพื่อสลับ)"; }
}
function cycleTheme(){ const cur=localStorage.getItem("prontera_theme")||"auto"; const nx={auto:"light",light:"dark",dark:"auto"}[cur]; localStorage.setItem("prontera_theme",nx); applyTheme(); toast("ธีม: "+nx); }
_mq.addEventListener("change",()=>{ if((localStorage.getItem("prontera_theme")||"auto")==="auto") applyTheme(); });

/* ── command palette (⌘K / Ctrl+K) — jump targets reuse the same NAV array that builds #nav/#mnav, so this list can never drift out of sync. m2: /history_search results are wired in as a second, debounced group below the (still-instant) NAV matches. */
let cmdkItems=NAV.slice(), cmdkSel=0;
let cmdkHistItems=[], cmdkHistQuery="", cmdkHistTimer=null, cmdkHistReq=0;
let pendingSearchQuery=null; // set by a history-result activation; renderSearch() consumes it on entry
function cmdkMatch(n,q){ if(!q) return true; q=q.toLowerCase(); return n[1].toLowerCase().indexOf(q)>=0 || n[0].toLowerCase().indexOf(q)>=0; }
function cmdkItemHtml(it,i){
  const sel=i===cmdkSel?" sel":"";
  if(it.kind==="hist"){
    const r=it.r, snip=(r.snippet||"").slice(0,90);
    return '<div class="cmdk-item hist'+sel+'" data-i="'+i+'"><div class="hh"><b>'+esc(r.title||"")+'</b><span class="chip">'+esc(r.kind||"")+'</span></div>'+(snip?'<div class="hs">'+esc(snip)+'</div>':'')+'</div>';
  }
  return '<div class="cmdk-item'+sel+'" data-i="'+i+'">'+ic(it.icon)+'<span>'+esc(it.label)+'</span></div>';
}
function cmdkRenderList(){
  const list=document.getElementById("cmdkList"); const q=(document.getElementById("cmdkInput").value||"").trim();
  const navMatches=NAV.filter(n=>cmdkMatch(n,q)).map(n=>({kind:"nav",id:n[0],label:n[1],icon:n[2]}));
  const histMatches=cmdkHistItems.map(r=>({kind:"hist",r:r}));
  cmdkItems=navMatches.concat(histMatches);
  if(!cmdkItems.length){ list.innerHTML='<div class="cmdk-empty">ไม่พบหัวข้อที่ตรงกับ "'+esc(q)+'"</div>'; return; }
  if(cmdkSel>=cmdkItems.length) cmdkSel=0;
  let html=navMatches.map((it,i)=>cmdkItemHtml(it,i)).join("");
  if(histMatches.length) html+='<div class="cmdk-group">ประวัติงาน</div>'+histMatches.map((it,i)=>cmdkItemHtml(it,navMatches.length+i)).join("");
  list.innerHTML=html;
  list.querySelectorAll(".cmdk-item").forEach(el=>{
    el.onmousedown=e=>e.preventDefault(); // keep focus on input
    el.onclick=()=>cmdkActivate(parseInt(el.dataset.i,10));
    el.onmouseenter=()=>{ cmdkSel=parseInt(el.dataset.i,10); cmdkUpdateSel(); };
  });
}
async function cmdkRunHistFetch(q){
  const myReq=++cmdkHistReq;
  const d=await getJSON("/history_search?q="+encodeURIComponent(q)+"&limit=6");
  if(myReq!==cmdkHistReq) return; // a newer request started while this one was in flight — drop it
  cmdkHistItems=Array.isArray(d)?d.slice(0,6):[];
  cmdkHistQuery=q;
  cmdkRenderList();
}
function cmdkRender(){
  const q=(document.getElementById("cmdkInput").value||"").trim();
  if(cmdkHistTimer){ clearTimeout(cmdkHistTimer); cmdkHistTimer=null; }
  if(q!==cmdkHistQuery){ cmdkHistItems=[]; } // stale results from a previous query — clear immediately, instant NAV filter is unaffected
  cmdkRenderList(); // NAV filtering stays synchronous/instant
  if(q.length>=2) cmdkHistTimer=setTimeout(()=>cmdkRunHistFetch(q),200);
}
function cmdkUpdateSel(){
  document.querySelectorAll(".cmdk-item").forEach(el=>el.classList.toggle("sel",parseInt(el.dataset.i,10)===cmdkSel));
  const sel=document.querySelector(".cmdk-item.sel"); if(sel) sel.scrollIntoView({block:"nearest"});
}
function cmdkActivate(i){
  const it=cmdkItems[i]; if(!it) return;
  if(it.kind==="hist"){
    const q=cmdkHistQuery;
    cmdkClose();
    pendingSearchQuery=q;
    go("search");
    return;
  }
  go(it.id); cmdkClose();
}
function cmdkOpen(){
  const ov=document.getElementById("cmdkOverlay"); if(ov.classList.contains("on")) return;
  ov.classList.add("on"); cmdkSel=0;
  const inp=document.getElementById("cmdkInput"); inp.value="";
  if(cmdkHistTimer){ clearTimeout(cmdkHistTimer); cmdkHistTimer=null; }
  cmdkHistItems=[]; cmdkHistQuery=""; cmdkHistReq++;
  cmdkRenderList(); setTimeout(()=>inp.focus(),0);
}
function cmdkClose(){
  const ov=document.getElementById("cmdkOverlay"); if(!ov.classList.contains("on")) return;
  ov.classList.remove("on"); document.getElementById("cmdkInput").blur();
  if(cmdkHistTimer){ clearTimeout(cmdkHistTimer); cmdkHistTimer=null; }
}
function cmdkIsTyping(el){
  if(!el) return false; const tag=(el.tagName||"").toLowerCase();
  return tag==="input"||tag==="textarea"||tag==="select"||el.isContentEditable;
}
document.getElementById("cmdkInput").addEventListener("input",()=>{ cmdkSel=0; cmdkRender(); });
document.getElementById("cmdkInput").addEventListener("keydown",e=>{
  if(e.key==="ArrowDown"){ e.preventDefault(); if(cmdkItems.length) cmdkSel=Math.min(cmdkSel+1,cmdkItems.length-1); cmdkUpdateSel(); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(cmdkItems.length) cmdkSel=Math.max(cmdkSel-1,0); cmdkUpdateSel(); }
  else if(e.key==="Enter"){ e.preventDefault(); cmdkActivate(cmdkSel); }
  else if(e.key==="Escape"){ e.preventDefault(); e.stopPropagation(); cmdkClose(); }
});
document.getElementById("cmdkOverlay").addEventListener("mousedown",e=>{ if(e.target.id==="cmdkOverlay") cmdkClose(); });
document.getElementById("cmdkOpenBtn").onclick=cmdkOpen;
document.addEventListener("keydown",e=>{
  const overlay=document.getElementById("cmdkOverlay"), isOpen=overlay.classList.contains("on");
  if((e.metaKey||e.ctrlKey)&&(e.key==="k"||e.key==="K")){
    // never hijack normal typing (#say, #hq, or any other text field) unless the palette itself is already open
    if(!isOpen && cmdkIsTyping(document.activeElement)) return;
    e.preventDefault();
    if(isOpen) cmdkClose(); else cmdkOpen();
    return;
  }
  if(e.key==="Escape"&&isOpen){ cmdkClose(); }
});

applyTheme();
buildNav();
document.getElementById("themeBtn").onclick=cycleTheme;
go("overview"); refreshTokens(); setInterval(refreshTokens,30000);
</script>
