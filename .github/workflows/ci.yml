name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Validate prontera-v2.html
        run: htmlhint prontera-v2.html --config .htmlhintrc 2>/dev/null || htmlhint prontera-v2.html

      - name: Check file size (guard against accidental truncation)
        run: |
          SIZE=$(wc -c < prontera-v2.html)
          echo "prontera-v2.html size: $SIZE bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: prontera-v2.html is suspiciously small ($SIZE bytes) — possible truncation"
            exit 1
          fi

      - name: Validate prontera-v3.html (new dashboard, informational)
        run: '[ -f prontera-v3.html ] && (htmlhint prontera-v3.html || true) || echo "v3 not present yet"'

      - name: Guard prontera-v3.html size (block truncation)
        run: |
          if [ -f prontera-v3.html ]; then
            SIZE=$(wc -c < prontera-v3.html)
            echo "prontera-v3.html size: $SIZE bytes"
            if [ "$SIZE" -lt 8000 ]; then
              echo "ERROR: prontera-v3.html suspiciously small ($SIZE bytes) — possible truncation"
              exit 1
            fi
          fi
